<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.S.A - School Task, Schedule, Announcement</title>
    <link rel="icon" type="image/png" href="css/imgs/mainlogo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="stsa">
    <aside class="sidebar">
        <img class="menu" src="css/imgs/Hamburger_icon.png" alt="">
        <div id="dp" class="picture"><img class="picture" src="css/imgs/profile.png"></div>
        <div class="info">  
            <h3 class="info">Username</h3>
            <h3 class="info">School</h3>
            <h3 class="info">Year & Course</h3>
            <h3 class="info">Email</h3>
        </div>
        <div class="settings">
            <a  class="contact" href="mainpage.html">about us</a>
        </div>
    </aside>
    <div class="supermain">
        <main class="main">
            <div class="subsect">
                <div class="sections">
                    <div class="sect">
                        <h3 class="feature">To Do</h3>
                        <h3 class="feature">due:</h3>
                    </div>
                    <div class="minsect">
                        <button class="add">+<input class="input" type="text" placeholder="Add"></button>
                        <input type="datetime-local" class="date">
                        <div>
                            <ul class="task"></ul>
                        </div>
                    </div>
                </div>
                <div class="sections">
                    <div class="sect">
                        <h3 class="feature">Schedule</h3>
                        <h3 class="feature">time & date:</h3>
                    </div>
                    <div class="minsect">
                        <button class="add">+<input class="input" type="text" placeholder="Add"></button>
                        <input type="datetime-local" class="date">
                        <div>
                            <ul class="task"></ul>
                        </div>
                    </div>
                </div>
                <div class="sections">
                    <div class="sect">
                        <h3 class="feature">Modules</h3>
                    </div>
                    <div class="minsect">
                        <button class="add">+<input class="input"  type="text" placeholder="Add"></button>
                        <div>
                            <ul class="task"></ul>
                        </div>
                    </div>
                </div>
            </div>
            <div class="subsect2">
                <div class="announce">
                    <h3 class='feature'>Announcements</h3>
                    <div class="messages">

                    </div>
                    <div class="message">
                        <textarea id="message" rows="1" cols="30" placeholder="Announcement"></textarea>
                        <button class="send">send</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
