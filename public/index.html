<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.S.A - School Task, Schedule, Announcement</title>
    <link rel="icon" type="image/png" href="css/imgs/mainlogo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="stsa">
    <aside id="sidebar" class="sidebar">
        <div class="menubar">
            <button class="hamburger">
                <img class="imenu" src="css/imgs/Hamburger_icon.png" alt="menu">
            </button>
        </div>
        <div id="frame">
            <img class="picture" src="/public/css/imgs/profile.png" alt="" role="button">
        </div>
        <div class="profile">
            <ul class="infoBox">
                <p id="lname" class="label">username</p>
                <li id="name" class="info"></li>
                <p id="lemail" class="label">email</p>
                <li id="email" class="info"></li>
                <p id="lcourse" class="label">course</p>
                <li id="course" class="info"></li>
                <p class="label">verified: </p><p id="verification" class="label"></p>
            </ul>
        </div>
        <div class="settings">
            <a class="contact" href="">Settings</a>
            <a  class="contact" href="mainpage.html">About us</a>
            <a  class="contact" href="">Support us</a>
        </div>
    </aside>
    <div class="supermain">
        <main class="main">
            <div class="subsect">
                <div id="todd" class="sections">
                    <div class="subtitle">
                        <h3 class='feature'>To Do</h3>
                        <img id="todoMenu" class="menu" src="/public/css/imgs/menu.png" alt="">
                    </div>
                    <div class="minsect">
                        <button class="add">+<input class="input" type="text" placeholder="Add"></button>
                        <input id="todoDate"type="datetime-local" class="date">
                        <div class="sub">
                            <ul class="task"></ul>
                        </div>
                    </div>
                </div>
                <div id="sched" class="sections">
                    <div class="subtitle">
                        <h3 class='feature'>Schedule</h3>
                        <img id="schedMenu" class="menu" src="/public/css/imgs/menu.png" alt="">
                    </div>
                    <div class="minsect">
                        <button class="add">+<input class="input" type="text" placeholder="Add"></button>
                        <input id="schedDate" type="datetime-local" class="date">
                        <div class="sub">
                            <ul class="task"></ul>
                        </div>
                    </div>
                </div>
                <div id="module" class="sections">
                    <div class="subtitle">
                        <h3 class='feature'>Modules</h3>
                        <img id="moduleMenu" class="menu" src="/public/css/imgs/menu.png" alt="">
                    </div>
                    <div class="minsect">
                        <button class="add">+<input class="input"  type="text" placeholder="Add"></button>
                        <div class="sub">
                            <ul class="task"></ul>
                        </div>
                    </div>
                </div>
            </div>
            <div class="subsect2">
                <div class="announce">
                    <div class="subtitle">
                        <h3 class='feature'>Announcements</h3>
                        <img id="announceMenu" class="menu" src="/public/css/imgs/menu.png" alt="">
                    </div>
                    <div class="messages">
                        <button class="class">Join Class</button>
                        <button class="class">Create Class</button>
                    </div>
                    <br>
                    <div class="message">
                        <textarea id="message" rows="1" cols="30" placeholder="Announcement"></textarea>
                        <button class="send"><img class="sendimg" src="/public/css/imgs/send.png"></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="chooser">
        <button class="icon">
            <img class="op" src="css/imgs/notification.png" alt="notif">
            <img class="close" src="css/imgs/close.png" alt="close">
        </button>
        <a id="profileIcon" class="icon" href="/public/profile.html">
            <img class="profIcon" src="/public/css/imgs/profile-icon.png" alt="profile">
        </a>
    </div>
    <aside class="notif">
        <h3 id="notifTitle" class="feature">Notifications</h4>
        <div id="notification">

        </div>
    </aside>
    <script src="/public/js/script.js" defer></script>
</body>
</html>
